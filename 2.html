<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Подкаст Плеер</title>
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .rss-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .rss-input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .rss-input-group input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .rss-input-group button {
            padding: 12px 24px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .examples {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        
        .examples a {
            color: #764ba2;
            cursor: pointer;
            text-decoration: underline;
            margin: 0 5px;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
        }
        
        .footer a {
            color: white;
            cursor: pointer;
            text-decoration: underline;
        }
        
        #player-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="rss-card">
        <h3>📡 Подкаст плеер</h3>
        <p style="color: #666; margin-bottom: 10px;">Введите RSS ссылку вашего подкаста или выберите из примеров</p>
        <div class="rss-input-group">
            <input type="text" id="rss-url" placeholder="https://example.com/podcast.rss">
            <button id="load-rss">📥 Загрузить</button>
        </div>
        <div class="examples">
            🔥 Примеры для теста:
            <a data-rss="https://feeds.megaphone.fm/ESP1614110167">The Daily (NYT)</a> |
            <a data-rss="https://feeds.simplecast.com/54nAGcIl">How I Built This</a> |
            <a data-rss="https://rss.art19.com/lexicon-valley">Lexicon Valley</a>
        </div>
    </div>
    
    <div id="player-container"></div>
    
    <div class="footer">
        <a id="reset-progress">🗑️ Сбросить весь прогресс</a>
    </div>
</div>

<script type="module">
    import { Player } from './standalone-player.js';
    
    let currentPlayer = null;
    
    function createPlayer(rssUrl = null) {
        if (currentPlayer) {
            currentPlayer.destroy();
        }
        
        currentPlayer = new Player({
            container: () => document.getElementById('player-container'),
            rssUrl: rssUrl,
            audio: rssUrl ? null : {
                title: 'Введите RSS подкаста выше',
                artist: 'Подкаст',
                src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                cover: 'https://via.placeholder.com/80?text=🎙️'
            },
            enableProgressTracking: true,
            enableBookmarks: true,
            socialSharing: true,
            autoNextEpisode: true,
            themeColor: '#764ba2'
        });
        
        currentPlayer.on('rssLoaded', (episodes) => {
            console.log(`✅ Загружено ${episodes.length} эпизодов`);
        });
        
        currentPlayer.on('rssError', (error) => {
            console.error('RSS error:', error);
        });
        
        return currentPlayer;
    }
    
    createPlayer();
    
    document.getElementById('load-rss').addEventListener('click', () => {
        const url = document.getElementById('rss-url').value.trim();
        if (url) {
            createPlayer(url);
        } else {
            alert('Введите RSS ссылку');
        }
    });
    
    document.querySelectorAll('[data-rss]').forEach(link => {
        link.addEventListener('click', () => {
            const url = link.getAttribute('data-rss');
            document.getElementById('rss-url').value = url;
            createPlayer(url);
        });
    });
    
    document.getElementById('reset-progress').addEventListener('click', () => {
        if (confirm('Сбросить весь прогресс прослушивания и закладки?')) {
            localStorage.removeItem('podcast_progress');
            localStorage.removeItem('podcast_bookmarks');
            alert('Сброшено! Обновите страницу.');
            location.reload();
        }
    });
</script>
</body>
</html>
