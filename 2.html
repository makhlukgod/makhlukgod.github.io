<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Подкаст Плеер</title>
    <style>
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(100px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .info-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .info-card h3 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        
        .info-card p {
            color: #666;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
        }
        
        .footer a {
            color: white;
            cursor: pointer;
            text-decoration: underline;
        }
        
        #player-container {
            margin-top: 20px;
        }
        
        button {
            transition: transform 0.1s ease;
        }
        
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="info-card">
        <h3>🎙️ Подкаст Плеер</h3>
        <p>✅ Прогресс прослушивания сохраняется<br>
        ✅ Можно добавлять сколько угодно закладок<br>
        ✅ Все данные хранятся в браузере (localStorage)<br>
        ✅ Закладки сохраняются после перезагрузки</p>
    </div>
    
    <div id="player-container"></div>
    
    <div class="footer">
        <a id="reset-progress">🗑️ Сбросить весь прогресс и закладки</a>
    </div>
</div>

<script type="module">
    import { Player } from './standalone-player.js';
    
    // ============================================
    // 🔥 ЗДЕСЬ ВСТАВЬТЕ ВАШУ RSS ССЫЛКУ
    // ============================================
    const YOUR_RSS_URL = 'https://cloud.mave.digital/45361';
    // ============================================
    
    let currentPlayer = null;
    
    function createPlayer() {
        if (currentPlayer) {
            currentPlayer.destroy();
        }
        
        currentPlayer = new Player({
            container: () => document.getElementById('player-container'),
            rssUrl: YOUR_RSS_URL,
            audio: {
                title: 'Загрузка подкаста...',
                artist: 'Подкаст',
                src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
                cover: 'https://via.placeholder.com/80?text=🎙️'
            },
            enableProgressTracking: true,
            enableBookmarks: true,
            socialSharing: true,
            autoNextEpisode: true,
            themeColor: '#764ba2'
        });
        
        currentPlayer.on('rssLoaded', (episodes) => {
            console.log(`✅ Загружено ${episodes.length} эпизодов`);
        });
        
        currentPlayer.on('rssError', (error) => {
            console.error('Ошибка загрузки RSS:', error);
        });
        
        currentPlayer.on('bookmarkAdded', (bookmark) => {
            console.log(`📌 Добавлена закладка: ${bookmark.note} (${bookmark.formattedTime})`);
        });
        
        return currentPlayer;
    }
    
    createPlayer();
    
    // Сброс прогресса и закладок
    document.getElementById('reset-progress').addEventListener('click', () => {
        if (confirm('Сбросить весь прогресс прослушивания и все закладки?\n\nЭто действие нельзя отменить.')) {
            localStorage.removeItem('podcast_progress');
            localStorage.removeItem('podcast_bookmarks');
            alert('✅ Все данные сброшены! Страница будет обновлена.');
            location.reload();
        }
    });
    
    // Для отладки - показываем в консоли что сохранено
    setTimeout(() => {
        const savedBookmarks = localStorage.getItem('podcast_bookmarks');
        if (savedBookmarks) {
            const count = JSON.parse(savedBookmarks).length;
            console.log(`📊 В localStorage найдено ${count} сохранённых закладок`);
        }
    }, 1000);
</script>
</body>
</html>
