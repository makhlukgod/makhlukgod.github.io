<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Подкаст Плеер</title>
    
    <!-- Стили оригинального Shikwasa -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shikwasa@2.2.1/dist/style.css">
    
    <!-- Наши дополнительные стили -->
    <link rel="stylesheet" href="./shikwasa-enhanced.css">
    
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #player-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 14px;
        }
        .footer a {
            color: white;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div>
    <div class="header">
        <h1>🎙️ Подкаст Плеер</h1>
        <p>С поддержкой RSS, закладок и сохранением прогресса</p>
    </div>
    
    <div id="player-container"></div>
    
    <div class="footer">
        <p>✨ Работает оффлайн | 💾 Прогресс сохраняется | 🔖 Закладки работают</p>
        <a id="reset-progress">🗑️ Сбросить прогресс</a>
    </div>
</div>

<!-- Загружаем оригинальный Shikwasa (глобальная переменная) -->
<script src="https://cdn.jsdelivr.net/npm/shikwasa@2.2.1/dist/shikwasa.min.js"></script>

<!-- Загружаем наш расширенный плеер -->
<script type="module">
    import { Player } from './shikwasa-enhanced.js';
    
    console.log('Плеер загружен, Shikwasa доступен:', typeof window.Shikwasa);
    
    // Создаем плеер
    const player = new Player({
        container: () => document.querySelector('#player-container'),

        rssUrl: '1.xml', 
        
        
        
        // Включаем функции
        enableProgressTracking: true,
        enableBookmarks: true,
        socialSharing: true,
        
        // Настройки
        themeColor: '#764ba2',
        speedOptions: [0.5, 0.75, 1, 1.25, 1.5, 2],
        download: true
    });
    
    // Сброс прогресса
    document.getElementById('reset-progress').addEventListener('click', () => {
        if (confirm('Сбросить весь прогресс и закладки?')) {
            localStorage.removeItem('shikwasa_progress');
            localStorage.removeItem('shikwasa_bookmarks');
            alert('Сброшено! Обновите страницу.');
            location.reload();
        }
    });
    
    console.log('✅ Плеер готов!');
</script>
</body>
</html>
